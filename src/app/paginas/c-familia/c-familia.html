<div class="container mt-5">
  <h2 class="text-center mb-4 fw-bold">
    
  </h2>

  <div class="row">
    <div class="col-md-4 mb-4" *ngFor="let persona of familia">
      <div class="card shadow-lg h-100 border-0">

        <!-- Imagen opcional (si luego agregas fotos) -->
        <img src="assets/familia.jpg" class="card-img-top" height="250">

        <div class="card-body">
          <h5 class="card-title fw-bold">
            {{ persona.nombre }} {{ persona.apellido }}
          </h5>

          <p class="mb-1">
            Fecha de nacimiento: {{ persona.fecha_nac }}
          </p>

          <p class="mb-1">
             Signo zodiacal: {{ persona.signo_zod || 'No definido' }}
          </p>
        </div>

      </div>
    </div>
  </div>
</div>
